name: Bump version
on:
  push:
    branches:
      - main

jobs:
 bump-version:
    if: ${{ startsWith(github.event.head_commit.message, 'chore(deps):') }}
    name: "bump-version"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install dependencies
        run: |
          uv sync --all-extras
      - name: Bump version
        run: uv run bump_version
        env:
          BUMP: patch
        #run: uv run bump-my-version bump patch --config-file src/commit_hooks/templates/configs/cfg_version_bump.toml --tag --commit
